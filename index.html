<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>職場心理測驗平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const { Brain, Target, Zap, ChevronLeft } = lucide;

        function App() {
            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 text-center">
                    <div className="bg-white p-12 rounded-3xl shadow-2xl border border-gray-100 max-w-lg">
                        <div className="bg-green-100 text-green-700 px-4 py-2 rounded-full inline-block mb-6 font-bold">✓ 網站已成功連線</div>
                        <h1 className="text-4xl font-black mb-6 text-gray-800">測驗平台</h1>
                        <p className="text-gray-600 mb-8 text-lg">如果您看到這個畫面，代表您的 GitHub 設定完全正確！</p>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="p-8 border-2 rounded-2xl bg-indigo-50 border-indigo-100">
                                <Brain className="mx-auto text-indigo-600 w-10 h-10 mb-2"/>
                                <div className="font-bold">MBTI</div>
                            </div>
                            <div className="p-8 border-2 rounded-2xl bg-teal-50 border-teal-100">
                                <Target className="mx-auto text-teal-600 w-10 h-10 mb-2"/>
                                <div className="font-bold">DiSC</div>
                            </div>
                        </div>
                        <button onClick={() => window.location.reload()} className="mt-10 w-full py-4 bg-gray-800 text-white rounded-2xl font-bold shadow-lg hover:bg-black transition-all">點此重新整理</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
