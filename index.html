<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>系統診斷中...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div id="root">
        <div class="text-center p-10 bg-white shadow-xl rounded-2xl border-4 border-red-500">
            <h1 class="text-2xl font-black text-red-600">偵測到載入異常</h1>
            <p class="mt-4">請確保下方腳本成功執行。</p>
        </div>
    </div>

    <script type="text/babel">
        function App() {
            return (
                <div className="text-center p-12 bg-white shadow-2xl rounded-3xl border-4 border-green-500 animate-bounce">
                    <h1 className="text-4xl font-black text-green-600">恭喜！系統框架已就緒</h1>
                    <p className="mt-6 text-xl text-gray-600">如果您看到這行字，代表您的發布通道完全正常。</p>
                    <p className="mt-2 text-gray-400">請在對話框告訴我「看到綠色框架」，我會給你分段式的完整代碼。</p>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
